name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    # Release commits push three tags at once (vX.Y.Z plus the rolling vX.Y.x
    # and vX.x.x aliases, all pointing at the same commit). Only run for the
    # exact version tag so the two aliases don't trigger duplicate concurrent
    # `npm publish` runs that race and fail with 403.
    if: ${{ !endsWith(github.ref_name, '.x') }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: bun run build

      - name: Publish
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'
          release: 'true'
          release-tag: ${{ github.ref_name }}
          release-files: none
          release-changelog: auto
          release-token: ${{ secrets.GITHUB_TOKEN }}
